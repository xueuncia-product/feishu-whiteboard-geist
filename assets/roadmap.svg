<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" width="1600" height="560">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 4 L0 8 z" fill="#4A5052"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1600" height="560" fill="#FAFBFB"/>

  <!-- title -->
  <rect x="40" y="28" width="1520" height="60" rx="6" fill="#10A37F"/>
  <text x="64" y="66" font-size="28" font-weight="700" fill="#FFFFFF">新功能上线 · 推进路线</text>
  <text x="1536" y="65" font-size="15" fill="#E7F6F0" text-anchor="end">5 阶段 · 每段一个产出</text>

  <!-- arrows between stages -->
  <line x1="318" y1="290" x2="358" y2="290" stroke="#4A5052" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="606" y1="290" x2="646" y2="290" stroke="#4A5052" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="894" y1="290" x2="934" y2="290" stroke="#4A5052" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1182" y1="290" x2="1222" y2="290" stroke="#4A5052" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 1: 调研 (neutral dark) -->
  <rect x="48" y="160" width="270" height="260" rx="8" fill="#0A0C0C"/>
  <text x="76" y="212" font-size="15" fill="#9AA0A2">01</text>
  <text x="76" y="250" font-size="24" font-weight="700" fill="#FFFFFF">调研</text>
  <text x="76" y="284" font-size="14" fill="#C9CDCE">访谈 + 竞品分析</text>
  <rect x="76" y="320" width="160" height="40" rx="20" fill="#E9F1FC"/>
  <text x="156" y="346" font-size="14" font-weight="700" fill="#2C5FB0" text-anchor="middle">需求清单</text>

  <!-- Stage 2: 设计 (blue) -->
  <rect x="336" y="160" width="270" height="260" rx="8" fill="#FFFFFF" stroke="#3B7DE0" stroke-width="2"/>
  <text x="364" y="212" font-size="15" fill="#6B7173">02</text>
  <text x="364" y="250" font-size="24" font-weight="700" fill="#0A0C0C">设计</text>
  <text x="364" y="284" font-size="14" fill="#6B7173">交互 + 视觉稿</text>
  <rect x="364" y="320" width="160" height="40" rx="20" fill="#F0ECF9"/>
  <text x="444" y="346" font-size="14" font-weight="700" fill="#7E57C2" text-anchor="middle">待共创评审</text>

  <!-- Stage 3: 开发 (green) -->
  <rect x="624" y="160" width="270" height="260" rx="8" fill="#FFFFFF" stroke="#10A37F" stroke-width="2"/>
  <text x="652" y="212" font-size="15" fill="#6B7173">03</text>
  <text x="652" y="250" font-size="24" font-weight="700" fill="#0A0C0C">开发</text>
  <text x="652" y="284" font-size="14" fill="#6B7173">前后端联调</text>
  <rect x="652" y="320" width="160" height="40" rx="20" fill="#E7F6F0"/>
  <text x="732" y="346" font-size="14" font-weight="700" fill="#0B7355" text-anchor="middle">可测版本</text>

  <!-- Stage 4: 灰度 (amber) -->
  <rect x="912" y="160" width="270" height="260" rx="8" fill="#FFFFFF" stroke="#E8A23D" stroke-width="2"/>
  <text x="940" y="212" font-size="15" fill="#6B7173">04</text>
  <text x="940" y="250" font-size="24" font-weight="700" fill="#0A0C0C">灰度</text>
  <text x="940" y="284" font-size="14" fill="#6B7173">5% 用户放量</text>
  <rect x="940" y="320" width="180" height="40" rx="20" fill="#FCF2E1"/>
  <text x="1030" y="346" font-size="14" font-weight="700" fill="#8A5B12" text-anchor="middle">待拍板全量</text>

  <!-- Stage 5: 上线 (neutral dark) -->
  <rect x="1200" y="160" width="270" height="260" rx="8" fill="#0A0C0C"/>
  <text x="1228" y="212" font-size="15" fill="#9AA0A2">05</text>
  <text x="1228" y="250" font-size="24" font-weight="700" fill="#FFFFFF">上线</text>
  <text x="1228" y="284" font-size="14" fill="#C9CDCE">全量 + 监控</text>
  <rect x="1228" y="320" width="160" height="40" rx="20" fill="#E7F6F0"/>
  <text x="1308" y="346" font-size="14" font-weight="700" fill="#0B7355" text-anchor="middle">正式发布</text>
</svg>
