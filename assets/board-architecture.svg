  <text x="1331" y="882" font-size="13.5" fill="#1A1E1F">实时任务编排</text>
  <text x="1331" y="910" font-size="13.5" fill="#1A1E1F">营销 / 返佣 / 绩效 复杂场景</text>
  <text x="1331" y="938" font-size="13.5" font-weight="700" fill="#0B7355">本工作线 · 待建</text>

  <!-- ===== Row 5: 数据层 ===== -->
