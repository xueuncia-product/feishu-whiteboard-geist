  <text x="846" y="828" font-size="12" font-weight="700" fill="#8A5B12" text-anchor="middle">待建</text>
  <rect x="547" y="850" width="362" height="120" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
