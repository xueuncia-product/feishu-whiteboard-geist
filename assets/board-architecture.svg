  <rect x="1181" y="1000" width="499" height="46" rx="5" fill="#0A0C0C"/>
  <text x="1201" y="1029" font-size="15" font-weight="700" fill="#FFFFFF">CDP · Owner 庚</text>
  <rect x="1181" y="1050" width="499" height="120" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="1201" y="1084" font-size="13.5" fill="#1A1E1F">C 端个人平台 · 人群包 · AB Test</text>
  <text x="1201" y="1114" font-size="13.5" fill="#1A1E1F">实时标签接口</text>
