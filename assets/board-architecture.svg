  <text x="748" y="738" font-size="14" fill="#0A0C0C" text-anchor="middle">数据看板</text>
  <rect x="815" y="704" width="118" height="56" rx="4" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="1.5"/>
  <text x="874" y="738" font-size="14" fill="#0A0C0C" text-anchor="middle">返佣引擎</text>
  <rect x="941" y="704" width="118" height="56" rx="4" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="1.5"/>
  <text x="1000" y="738" font-size="14" fill="#0A0C0C" text-anchor="middle">优惠券额度</text>
  <rect x="1067" y="704" width="118" height="56" rx="4" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="1.5"/>
  <text x="1126" y="738" font-size="14" fill="#0A0C0C" text-anchor="middle">考试工具</text>
  <rect x="1193" y="704" width="104" height="56" rx="4" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="1.5"/>
  <text x="1245" y="738" font-size="14" fill="#0A0C0C" text-anchor="middle">人户关系</text>

  <rect x="1355" y="662" width="325" height="118" rx="5" fill="#F0ECF9" stroke="#7E57C2" stroke-width="2"/>
  <text x="1375" y="690" font-size="14" font-weight="700" fill="#7E57C2">子CRM 仅复用这 2 项：</text>
  <text x="1375" y="722" font-size="14" fill="#1A1E1F">贷款商户列表 · 贷款计算器</text>
  <text x="1375" y="752" font-size="12.5" fill="#6B7173">（子CRM 其余功能均自建）</text>

