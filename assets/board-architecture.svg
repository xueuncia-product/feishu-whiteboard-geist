  <text x="185" y="838" font-size="11" fill="#E7F6F0">Owner 丁</text>
  <rect x="165" y="850" width="362" height="120" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="185" y="882" font-size="13.5" fill="#1A1E1F">Metric Admin · B端内部</text>
  <text x="185" y="910" font-size="13.5" fill="#1A1E1F">大数据 · 后端指标效率</text>
  <text x="185" y="938" font-size="13.5" fill="#6B7173">查询统计 / 指标表注册</text>

  <rect x="547" y="800" width="362" height="46" rx="5" fill="#10A37F"/>
