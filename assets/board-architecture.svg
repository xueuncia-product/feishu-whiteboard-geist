  <text x="567" y="938" font-size="13.5" font-weight="700" fill="#0B7355">本工作线 · 待建</text>

  <rect x="929" y="800" width="362" height="46" rx="5" fill="#10A37F"/>
  <text x="949" y="822" font-size="15" font-weight="700" fill="#FFFFFF">数据看板搭建平台</text>
  <rect x="1182" y="808" width="92" height="30" rx="15" fill="#FCF2E1"/>
  <text x="1228" y="828" font-size="12" font-weight="700" fill="#8A5B12" text-anchor="middle">待建</text>
  <rect x="929" y="850" width="362" height="120" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
