  <text x="1070" y="172" font-size="13.5" fill="#6B7173">散入口收编为统一入口，用户成功迁移 — 正面案例</text>

  <!-- old card -->
  <rect x="1070" y="200" width="270" height="300" rx="6" fill="#F5F6F6" stroke="#E1E3E4" stroke-width="2"/>
  <text x="1090" y="234" font-size="14" font-weight="700" fill="#6B7173">旧 · 三个散入口合计</text>
  <text x="1090" y="296" font-size="44" font-weight="700" fill="#0A0C0C">1.08万</text>
  <text x="1090" y="324" font-size="13" fill="#6B7173">5 月 UV（去重）</text>
  <line x1="1090" y1="350" x2="1320" y2="350" stroke="#E1E3E4" stroke-width="1"/>
  <text x="1090" y="406" font-size="34" font-weight="700" fill="#8A5B12">0.21万</text>
  <text x="1090" y="432" font-size="13" fill="#6B7173">6 月 UV（已被吃量）</text>
  <text x="1090" y="470" font-size="12" fill="#9AA0A2">旧入口逐步退场</text>

  <!-- arrow -->
  <line x1="1346" y1="350" x2="1404" y2="350" stroke="#10A37F" stroke-width="3" marker-end="url(#arG)"/>
  <text x="1375" y="338" font-size="12" font-weight="700" fill="#0B7355" text-anchor="middle">迁移</text>

  <!-- new card -->
  <rect x="1410" y="200" width="240" height="300" rx="6" fill="#E7F6F0" stroke="#10A37F" stroke-width="2"/>
  <text x="1430" y="234" font-size="14" font-weight="700" fill="#0B7355">新 · 统一入口</text>
  <text x="1430" y="296" font-size="44" font-weight="700" fill="#0B7355">0.98万</text>
