<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1720 1010" width="1720" height="1010">
  <defs>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L9 4 L0 8 z" fill="#4A5052"/>
    </marker>
    <marker id="arG" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L9 4 L0 8 z" fill="#10A37F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1720" height="1010" fill="#FAFBFB"/>

  <!-- title -->
  <rect x="40" y="28" width="1640" height="60" rx="6" fill="#10A37F"/>
  <text x="64" y="66" font-size="25" font-weight="700" fill="#FFFFFF">示例 App · 埋点数据分析 · 2026-01 ~ 06</text>
  <text x="1656" y="65" font-size="14" fill="#E7F6F0" text-anchor="end">示例 · 全虚构 · 93 个埋点事件 · UV / PV 口径</text>

  <!-- ===== ① 大盘活跃趋势 (left-top) ===== -->
  <rect x="40" y="108" width="980" height="430" rx="6" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
