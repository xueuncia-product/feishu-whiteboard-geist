  <text x="70" y="524" font-size="12.5" fill="#9AA0A2">* 06月仅 26 天（MTD），月活已基本饱和、未折算；趋势稳定无下滑</text>

  <!-- ===== ② 改版成效 (right-top) ===== -->
  <rect x="1040" y="108" width="640" height="430" rx="6" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
