  <text x="296" y="494" font-size="13" fill="#6B7173" text-anchor="middle">02月</text>
  <!-- 03 2.17 h192 -->
  <rect x="390" y="278" width="92" height="192" rx="3" fill="#EDEFEF"/>
  <text x="436" y="266" font-size="18" font-weight="700" fill="#0A0C0C" text-anchor="middle">2.17</text>
  <text x="436" y="494" font-size="13" fill="#6B7173" text-anchor="middle">03月</text>
  <!-- 04 2.26 h200 highlight -->
  <rect x="530" y="270" width="92" height="200" rx="3" fill="#10A37F"/>
  <text x="576" y="258" font-size="18" font-weight="700" fill="#0B7355" text-anchor="middle">2.26</text>
  <text x="576" y="494" font-size="13" font-weight="700" fill="#0B7355" text-anchor="middle">04月 顶</text>
