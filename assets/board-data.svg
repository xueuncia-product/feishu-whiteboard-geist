  <line x1="1430" y1="350" x2="1630" y2="350" stroke="#C7E7DB" stroke-width="1"/>
  <text x="1430" y="406" font-size="34" font-weight="700" fill="#0B7355">1.22万</text>
  <text x="1430" y="432" font-size="13" fill="#1A1E1F">6 月 UV ↑ 仍在涨</text>
  <text x="1430" y="470" font-size="12" fill="#0B7355">全站第 5 高频</text>

  <!-- ===== ③ 下钻漏斗 (left-bottom) ===== -->
  <rect x="40" y="558" width="980" height="370" rx="6" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <rect x="40" y="558" width="6" height="370" rx="3" fill="#10A37F"/>
  <text x="70" y="596" font-size="19" font-weight="700" fill="#0A0C0C">③ 各模块下钻漏斗（6 月 UV · 到达率）</text>

  <!-- funnel row 1 -->
  <rect x="70" y="624" width="240" height="48" rx="5" fill="#10A37F"/>
  <text x="86" y="654" font-size="15" font-weight="700" fill="#FFFFFF">模块 A · 入口 15.8k</text>
  <line x1="316" y1="648" x2="356" y2="648" stroke="#4A5052" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="362" y="624" width="240" height="48" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="378" y="654" font-size="15" fill="#1A1E1F">详情 9.1k · 57%</text>
  <line x1="608" y1="648" x2="648" y2="648" stroke="#4A5052" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="654" y="624" width="240" height="48" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="670" y="654" font-size="15" fill="#1A1E1F">交易 5.0k · 32%</text>

  <!-- funnel row 2 -->
  <rect x="70" y="688" width="240" height="48" rx="5" fill="#3B7DE0"/>
  <text x="86" y="718" font-size="15" font-weight="700" fill="#FFFFFF">模块 B · 入口 11.0k</text>
  <line x1="316" y1="712" x2="356" y2="712" stroke="#4A5052" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="362" y="688" width="240" height="48" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="378" y="718" font-size="15" fill="#1A1E1F">列表 7.3k · 66%</text>
  <line x1="608" y1="712" x2="648" y2="712" stroke="#4A5052" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="654" y="688" width="240" height="48" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="670" y="718" font-size="15" fill="#1A1E1F">操作 2.4k · 22%</text>

  <!-- funnel row 3 -->
  <rect x="70" y="752" width="240" height="48" rx="5" fill="#7E57C2"/>
  <text x="86" y="782" font-size="15" font-weight="700" fill="#FFFFFF">模块 C · 入口 20.8k</text>
  <line x1="316" y1="776" x2="356" y2="776" stroke="#4A5052" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="362" y="752" width="240" height="48" rx="5" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <text x="378" y="782" font-size="15" fill="#1A1E1F">明细 6.5k · 31%</text>
  <line x1="608" y1="776" x2="648" y2="776" stroke="#4A5052" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="654" y="752" width="240" height="48" rx="5" fill="#FBE9E7" stroke="#D9534F" stroke-width="2"/>
  <text x="670" y="782" font-size="15" fill="#1A1E1F">奖励 &lt; 1%</text>

  <line x1="70" y1="828" x2="990" y2="828" stroke="#E1E3E4" stroke-width="1"/>
  <text x="70" y="858" font-size="13.5" fill="#1A1E1F">入口很热，但下钻一层即大幅衰减 — 信息架构偏深，核心数据埋在 3-4 层下里</text>
  <text x="70" y="886" font-size="13" fill="#6B7173">行为特征：重查账（看钱 / 看高频）· 轻操作（换机 / 盘点低频）· 运营动作待撬动</text>

  <!-- ===== ④ 沉默功能占比高 (right-bottom) ===== -->
  <rect x="1040" y="558" width="640" height="370" rx="6" fill="#FFFFFF" stroke="#E1E3E4" stroke-width="2"/>
  <rect x="1040" y="558" width="6" height="370" rx="3" fill="#E8A23D"/>
  <text x="1070" y="596" font-size="19" font-weight="700" fill="#0A0C0C">④ 沉默功能占比高</text>

  <rect x="1070" y="624" width="230" height="240" rx="6" fill="#FCF2E1" stroke="#E8A23D" stroke-width="2"/>
  <text x="1185" y="730" font-size="58" font-weight="700" fill="#8A5B12" text-anchor="middle">43%</text>
  <text x="1185" y="772" font-size="14" font-weight="700" fill="#8A5B12" text-anchor="middle">40 / 93 埋点</text>
  <text x="1185" y="798" font-size="13" fill="#8A5B12" text-anchor="middle">UV &lt; 200</text>

  <text x="1330" y="650" font-size="14" font-weight="700" fill="#0A0C0C">典型沉默页（UV 个位数）</text>
  <text x="1330" y="690" font-size="13.5" fill="#1A1E1F">· 详情下钻：佣金 / 日志 / 信息</text>
  <text x="1330" y="722" font-size="13.5" fill="#1A1E1F">· 申请中心各类申请入口</text>
  <text x="1330" y="754" font-size="13.5" fill="#1A1E1F">· 活动 / 等级升级查询（UV ≈ 1）</text>
  <line x1="1330" y1="784" x2="1650" y2="784" stroke="#E1E3E4" stroke-width="1"/>
  <text x="1330" y="816" font-size="13" fill="#6B7173">近一半埋点几乎无人触达</text>
  <text x="1070" y="900" font-size="13" fill="#6B7173">建议：高频数据上提、合并或下线死页；统一入口打法可复用</text>

