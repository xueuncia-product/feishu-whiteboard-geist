  <line x1="830" y1="958" x2="830" y2="984" stroke="#7FCBB4" stroke-width="1.5"/>
  <text x="870" y="977" font-size="15" font-weight="700" fill="#FFFFFF">43% 埋点沉默</text>
  <line x1="1110" y1="958" x2="1110" y2="984" stroke="#7FCBB4" stroke-width="1.5"/>
